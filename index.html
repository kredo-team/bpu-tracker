<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BPU &amp; Co — Work Tracker</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; min-height: 100vh; padding: 16px; color: #111; }
  .container { max-width: 100%; margin: 0 auto; }

  /* Header */
  .header { background: #111; color: #fff; border-radius: 8px; padding: 14px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .header h1 { font-size: 16px; font-weight: 700; }
  .header p { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .live-badge { background: #fff; color: #111; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
  .refresh-btn { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: #fff; font-size: 12px; padding: 5px 14px; border-radius: 6px; cursor: pointer; font-family: Arial, sans-serif; }
  .refresh-btn:hover { background: rgba(255,255,255,0.25); }

  /* Summary cards — clickable */
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 12px; }
  .sum-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 14px; text-align: center; cursor: pointer; transition: border-color 0.15s; }
  .sum-card:hover { border-color: #111; }
  .sum-card.active { background: #111; border-color: #111; }
  .sum-card.active .sum-n { color: #fff; }
  .sum-card.active .sum-l { color: rgba(255,255,255,0.6); }
  .sum-n { font-size: 26px; font-weight: 700; color: #111; }
  .sum-l { font-size: 11px; color: #888; margin-top: 3px; }

  /* Deadline box */
  .deadline-box { background: #fff; border: 1px solid #ddd; border-left: 3px solid #111; border-radius: 8px; padding: 12px 16px; margin-bottom: 12px; }
  .deadline-title { font-size: 12px; font-weight: 700; color: #111; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .deadline-row { display: flex; justify-content: space-between; font-size: 12px; color: #444; padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
  .deadline-row:last-child { border-bottom: none; }

  /* Tabs */
  .view-tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .vtab { font-size: 13px; padding: 7px 20px; border-radius: 6px; border: 1px solid #ddd; background: #fff; color: #555; cursor: pointer; font-family: Arial, sans-serif; }
  .vtab:hover { border-color: #111; }
  .vtab.active { background: #111; color: #fff; border-color: #111; }

  /* Filter bar */
  .filter-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 8px; }
  .filter-info { font-size: 12px; color: #888; }
  .filter-right { display: flex; gap: 8px; align-items: center; }
  select { font-size: 12px; padding: 5px 10px; border: 1px solid #ddd; border-radius: 6px; background: #fff; cursor: pointer; font-family: Arial, sans-serif; }

  /* Table */
  .table-wrap { background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { background: #111; color: #fff; padding: 10px 14px; text-align: left; font-size: 12px; font-weight: 700; }
  tbody td { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; color: #222; vertical-align: middle; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #fafafa; }
  .task-name { font-weight: 600; color: #111; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: 700; border: 1px solid #ddd; color: #111; background: #f5f5f5; }
  .badge-progress { background: #111; color: #fff; border-color: #111; }
  .badge-done { background: #f0f0f0; color: #888; border-color: #ddd; }
  .badge-high { background: #111; color: #fff; border-color: #111; }
  .badge-medium { background: #f5f5f5; color: #555; border-color: #ccc; }
  .badge-low { background: #fff; color: #aaa; border-color: #eee; }

  /* Pagination */
  .pagination { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; background: #fff; border-top: 1px solid #eee; font-size: 12px; color: #666; }
  .page-btns { display: flex; gap: 4px; }
  .page-btn { padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; font-family: Arial, sans-serif; color: #444; }
  .page-btn:hover { background: #f5f5f5; }
  .page-btn.active { background: #111; color: #fff; border-color: #111; }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Person grid */
  .person-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .person-card { background: #fff; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
  .pc-head { padding: 12px 14px 10px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #f0f0f0; }
  .pc-avatar { width: 36px; height: 36px; border-radius: 50%; background: #111; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .pc-name { font-size: 13px; font-weight: 700; color: #111; }
  .pc-total { font-size: 11px; color: #888; margin-top: 1px; }
  .pc-stats { display: grid; grid-template-columns: repeat(3,1fr); border-bottom: 1px solid #f0f0f0; }
  .pc-stat { text-align: center; padding: 8px 4px; }
  .pc-num { font-size: 18px; font-weight: 700; color: #111; }
  .pc-lbl { font-size: 10px; color: #888; margin-top: 1px; }
  .pc-bar-row { padding: 8px 12px 4px; display: flex; align-items: center; gap: 8px; }
  .bar-track { flex: 1; height: 4px; background: #eee; border-radius: 2px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 2px; background: #111; }
  .bar-pct { font-size: 11px; color: #888; min-width: 30px; text-align: right; }
  .pc-tasks { padding: 6px 12px 10px; }
  .pc-task-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #f9f9f9; font-size: 12px; gap: 6px; }
  .pc-task-row:last-child { border-bottom: none; }
  .pc-task-name { color: #333; flex: 1; line-height: 1.4; }
  .more-tasks { font-size: 11px; color: #aaa; text-align: center; padding-top: 4px; }

  /* Status/error */
  .status-bar { text-align: center; font-size: 12px; color: #aaa; padding: 10px 0 4px; }
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid #ddd; border-top-color: #666; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg { background: #fff; border: 1px solid #ddd; border-left: 3px solid #111; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #444; margin: 12px 0; }
  .empty-row td { text-align: center; padding: 40px; color: #aaa; font-size: 14px; }

  @media(max-width: 768px) {
    .summary-grid { grid-template-columns: 1fr 1fr; }
    .person-grid { grid-template-columns: 1fr 1fr; }
  }
  @media(max-width: 480px) {
    .person-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>BPU &amp; Co — Work Tracker</h1>
      <p id="lastUpdated">Loading...</p>
    </div>
    <div class="header-right">
      <span class="live-badge" id="liveBadge">Loading</span>
      <button class="refresh-btn" onclick="loadData()">Refresh</button>
    </div>
  </div>

  <div id="statusArea"></div>

  <div class="summary-grid">
    <div class="sum-card active" id="card-all" onclick="filterByCard('all')">
      <div class="sum-n" id="cntAll">—</div>
      <div class="sum-l">Total tasks</div>
    </div>
    <div class="sum-card" id="card-pending" onclick="filterByCard('Pending')">
      <div class="sum-n" id="cntPend">—</div>
      <div class="sum-l">Pending</div>
    </div>
    <div class="sum-card" id="card-progress" onclick="filterByCard('In progress')">
      <div class="sum-n" id="cntProg">—</div>
      <div class="sum-l">In progress</div>
    </div>
    <div class="sum-card" id="card-completed" onclick="filterByCard('Completed')">
      <div class="sum-n" id="cntDone">—</div>
      <div class="sum-l">Completed</div>
    </div>
  </div>

  <div id="deadlineBox" style="display:none;" class="deadline-box">
    <div class="deadline-title">Upcoming deadlines</div>
    <div id="deadlineList"></div>
  </div>

  <div class="view-tabs">
    <button class="vtab active" id="vtab1" onclick="switchView(1)">Task view</button>
    <button class="vtab" id="vtab2" onclick="switchView(2)">Person view</button>
  </div>

  <!-- Task view -->
  <div id="taskView">
    <div class="filter-bar">
      <div class="filter-info" id="filterInfo">Showing all tasks</div>
      <div class="filter-right">
        <select id="personFilter" onchange="applyFilters()">
          <option value="all">All people</option>
        </select>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:36px;">#</th>
            <th style="width:160px;">Assigned to</th>
            <th>Task</th>
            <th style="width:110px;">Status</th>
            <th style="width:120px;">Deadline</th>
            <th style="width:90px;">Priority</th>
          </tr>
        </thead>
        <tbody id="taskBody">
          <tr><td colspan="6" class="empty-row">Loading tasks...</td></tr>
        </tbody>
      </table>
      <div class="pagination" id="pagination" style="display:none;">
        <div id="pageInfo">Page 1 of 1</div>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </div>

  <!-- Person view -->
  <div id="personView" style="display:none;">
    <div class="person-grid" id="personGrid">
      <div style="text-align:center;padding:32px;color:#aaa;grid-column:1/-1;">Loading...</div>
    </div>
  </div>

  <div class="status-bar" id="footerStatus"></div>

</div>

<script>
const SHEET_ID = '1xc0ySuQR6Ff3ztFH924wK1Nhg6_tQAnjwKohuanBgQM';
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;
const PAGE_SIZE = 25;

let allTasks = [];
let filteredTasks = [];
let currentPage = 1;
let activeStatus = 'all';

function statusBadge(s) {
  const v = (s||'').toLowerCase();
  if (v.includes('complet')||v.includes('done')) return `<span class="badge badge-done">Completed</span>`;
  if (v.includes('progress')) return `<span class="badge badge-progress">In progress</span>`;
  return `<span class="badge">Pending</span>`;
}

function priorityBadge(p) {
  const v = (p||'').toLowerCase();
  if (v==='high') return `<span class="badge badge-high">High</span>`;
  if (v==='low') return `<span class="badge badge-low">Low</span>`;
  return `<span class="badge badge-medium">Medium</span>`;
}

function normalizeStatus(s) {
  const v = (s||'').toLowerCase();
  if (v.includes('complet')||v.includes('done')) return 'Completed';
  if (v.includes('progress')) return 'In progress';
  return 'Pending';
}

function getInitials(name) {
  return (name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

async function loadData() {
  document.getElementById('statusArea').innerHTML = `<div class="status-bar"><span class="spinner"></span>Loading latest data...</div>`;
  document.getElementById('liveBadge').textContent = 'Loading';

  try {
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    const text = await res.text();
    const rows = parseCSV(text);

    if (rows.length < 2) { showError('No tasks found in sheet yet.'); return; }

    allTasks = rows.slice(1).filter(r => r[0] && r[0].trim()).map(r => ({
      task:        (r[0]||'').trim(),
      assigned_to: (r[1]||'Team').trim(),
      status:      normalizeStatus(r[2]),
      deadline:    (r[3]||'—').trim(),
      priority:    (r[4]||'Medium').trim(),
      source:      (r[5]||'').trim(),
      updated:     (r[6]||'').trim()
    }));

    updateCounts();
    updatePersonFilter();
    applyFilters();
    renderPersonView();
    renderDeadlines();

    const now = new Date();
    const timeStr = now.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',hour12:true}).toUpperCase();
    const dateStr = now.toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'});
    document.getElementById('lastUpdated').textContent = `Last refreshed: ${dateStr} ${timeStr}`;
    document.getElementById('liveBadge').textContent = 'Live';
    document.getElementById('statusArea').innerHTML = '';
    document.getElementById('footerStatus').textContent = `${allTasks.length} tasks — auto-updates every 5 min`;

  } catch(e) {
    showError('Could not load sheet. Make sure Google Sheet is shared as "Anyone with link can view". Error: ' + e.message);
  }
}

function parseCSV(text) {
  const rows = [];
  const lines = text.split('\n');
  for (const line of lines) {
    if (!line.trim()) continue;
    const row = [];
    let inQuote = false, cell = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c==='"') { inQuote = !inQuote; }
      else if (c===',' && !inQuote) { row.push(cell.trim()); cell = ''; }
      else { cell += c; }
    }
    row.push(cell.trim());
    rows.push(row);
  }
  return rows;
}

function showError(msg) {
  document.getElementById('statusArea').innerHTML = `<div class="error-msg">${msg}</div>`;
  document.getElementById('liveBadge').textContent = 'Error';
}

function updateCounts() {
  document.getElementById('cntAll').textContent  = allTasks.length;
  document.getElementById('cntPend').textContent = allTasks.filter(t=>t.status==='Pending').length;
  document.getElementById('cntProg').textContent = allTasks.filter(t=>t.status==='In progress').length;
  document.getElementById('cntDone').textContent = allTasks.filter(t=>t.status==='Completed').length;
}

function renderDeadlines() {
  const upcoming = allTasks.filter(t => t.status!=='Completed' && t.deadline && t.deadline!=='—' && t.deadline!=='Not specified');
  const box = document.getElementById('deadlineBox');
  if (!upcoming.length) { box.style.display='none'; return; }
  box.style.display='block';
  document.getElementById('deadlineList').innerHTML = upcoming.slice(0,5).map(t =>
    `<div class="deadline-row"><span>${t.task}</span><span>${t.assigned_to} — ${t.deadline}</span></div>`
  ).join('');
}

function updatePersonFilter() {
  const people = [...new Set(allTasks.map(t=>t.assigned_to))].sort();
  const sel = document.getElementById('personFilter');
  const cur = sel.value;
  sel.innerHTML = '<option value="all">All people</option>';
  people.forEach(p => {
    const o = document.createElement('option');
    o.value=p; o.textContent=p;
    if(p===cur) o.selected=true;
    sel.appendChild(o);
  });
}

function filterByCard(status) {
  activeStatus = status;
  document.querySelectorAll('.sum-card').forEach(c => c.classList.remove('active'));
  const map = {'all':'card-all','Pending':'card-pending','In progress':'card-progress','Completed':'card-completed'};
  if (map[status]) document.getElementById(map[status]).classList.add('active');
  currentPage = 1;
  applyFilters();
}

function applyFilters() {
  const person = document.getElementById('personFilter').value;
  filteredTasks = allTasks.filter(t => {
    const sm = activeStatus==='all' || t.status===activeStatus;
    const pm = person==='all' || t.assigned_to===person;
    return sm && pm;
  });
  currentPage = 1;
  renderTable();
  const label = activeStatus==='all' ? 'all tasks' : activeStatus.toLowerCase() + ' tasks';
  const personLabel = person==='all' ? '' : ` for ${person}`;
  document.getElementById('filterInfo').textContent = `Showing ${filteredTasks.length} ${label}${personLabel}`;
}

function renderTable() {
  const tbody = document.getElementById('taskBody');
  const totalPages = Math.max(1, Math.ceil(filteredTasks.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;

  const start = (currentPage - 1) * PAGE_SIZE;
  const end = start + PAGE_SIZE;
  const page = filteredTasks.slice(start, end);

  if (!page.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty-row">No tasks match this filter</td></tr>`;
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  tbody.innerHTML = page.map((t, i) => `<tr>
    <td style="color:#bbb;font-size:12px;">${start+i+1}</td>
    <td style="font-size:12px;color:#444;font-weight:600;">${t.assigned_to}</td>
    <td><div class="task-name">${t.task}</div></td>
    <td>${statusBadge(t.status)}</td>
    <td style="font-size:12px;color:#555;">${t.deadline}</td>
    <td>${priorityBadge(t.priority)}</td>
  </tr>`).join('');

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const pg = document.getElementById('pagination');
  const info = document.getElementById('pageInfo');
  const btns = document.getElementById('pageBtns');

  if (totalPages <= 1) { pg.style.display='none'; return; }
  pg.style.display='flex';

  const start = (currentPage-1)*PAGE_SIZE+1;
  const end = Math.min(currentPage*PAGE_SIZE, filteredTasks.length);
  info.textContent = `${start}–${end} of ${filteredTasks.length} tasks`;

  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>&#8592;</button>`;
  for (let p = 1; p <= totalPages; p++) {
    if (totalPages <= 7 || Math.abs(p-currentPage) <= 2 || p===1 || p===totalPages) {
      html += `<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
    } else if (Math.abs(p-currentPage) === 3) {
      html += `<span style="padding:5px 4px;color:#aaa;">...</span>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>&#8594;</button>`;
  btns.innerHTML = html;
}

function goPage(p) {
  const totalPages = Math.ceil(filteredTasks.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderTable();
  window.scrollTo(0, 0);
}

function renderPersonView() {
  const people = {};
  allTasks.forEach(t => {
    if (!people[t.assigned_to]) people[t.assigned_to] = { pending:0, progress:0, done:0, tasks:[] };
    const p = people[t.assigned_to];
    if (t.status==='Pending') p.pending++;
    else if (t.status==='In progress') p.progress++;
    else p.done++;
    p.tasks.push(t);
  });

  const names = Object.keys(people).sort((a,b) => {
    const ta = people[a], tb = people[b];
    if (tb.progress !== ta.progress) return tb.progress - ta.progress;
    if (tb.pending !== ta.pending) return tb.pending - ta.pending;
    return (tb.pending+tb.progress+tb.done) - (ta.pending+ta.progress+ta.done);
  });

  const maxTotal = Math.max(...names.map(n => people[n].pending+people[n].progress+people[n].done));

  document.getElementById('personGrid').innerHTML = names.map((name) => {
    const p = people[name];
    const total = p.pending+p.progress+p.done;
    const pct = maxTotal>0 ? Math.round((total/maxTotal)*100) : 0;
    const shown = p.tasks.slice(0, 4);
    const more = p.tasks.length - shown.length;

    return `<div class="person-card" style="cursor:pointer;" onclick="drillPerson('${name.replace(/'/g,"\\'")}')">
      <div class="pc-head">
        <div class="pc-avatar">${getInitials(name)}</div>
        <div><div class="pc-name">${name}</div><div class="pc-total">${total} task${total!==1?'s':''} — click to view</div></div>
      </div>
      <div class="pc-stats">
        <div class="pc-stat"><div class="pc-num">${p.pending}</div><div class="pc-lbl">Pending</div></div>
        <div class="pc-stat"><div class="pc-num">${p.progress}</div><div class="pc-lbl">In progress</div></div>
        <div class="pc-stat"><div class="pc-num">${p.done}</div><div class="pc-lbl">Done</div></div>
      </div>
      <div class="pc-bar-row">
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;"></div></div>
        <div class="bar-pct">${pct}%</div>
      </div>
      <div class="pc-tasks">
        ${shown.map(t => `<div class="pc-task-row">
          <div class="pc-task-name">${t.task}</div>
          ${statusBadge(t.status)}
        </div>`).join('')}
        ${more>0 ? `<div class="more-tasks">+${more} more</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function drillPerson(name) {
  // Switch to task view
  switchView(1);
  // Reset status filter to all
  activeStatus = 'all';
  document.querySelectorAll('.sum-card').forEach(c => c.classList.remove('active'));
  document.getElementById('card-all').classList.add('active');
  // Set person filter
  const sel = document.getElementById('personFilter');
  sel.value = name;
  // Apply filters
  currentPage = 1;
  applyFilters();
  // Scroll to top
  window.scrollTo(0, 0);
}

function switchView(n) {
  document.getElementById('taskView').style.display = n===1 ? 'block' : 'none';
  document.getElementById('personView').style.display = n===2 ? 'block' : 'none';
  document.getElementById('vtab1').className = 'vtab' + (n===1?' active':'');
  document.getElementById('vtab2').className = 'vtab' + (n===2?' active':'');
}

loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
